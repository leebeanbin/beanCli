services:
  # ── Infrastructure (always on) ────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: tfsdc-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tfsdc}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: tfsdc-zookeeper
    restart: unless-stopped
    ports:
      - '2181:2181'
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zkdata:/var/lib/zookeeper/data
      - zklog:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: tfsdc-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - '${KAFKA_PORT:-9092}:9092'
      - '${KAFKA_INTERNAL_PORT:-29092}:29092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ['CMD', 'kafka-broker-api-versions', '--bootstrap-server', 'localhost:29092']
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tfsdc-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_started
    ports:
      - '${KAFKA_UI_PORT:-8080}:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: tfsdc-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # ── One-shot migration (app profile) ─────────────────────────
  migrate:
    image: postgres:15-alpine
    container_name: tfsdc-migrate
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATABASE: ${POSTGRES_DB:-tfsdc}
    volumes:
      - ./packages/sql/migrations:/migrations:ro
      - ./docker/migrate-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ['/bin/sh', '/entrypoint.sh']
    restart: 'no'

  # ── App services (app profile) ────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: tfsdc-api
    container_name: tfsdc-api
    profiles: [app]
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - '${API_PORT:-3100}:3100'
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-prod}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-tfsdc}
      KAFKA_BROKER: kafka:29092
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-tfsdc-projector}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      PORT: 3100
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3100/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  projector:
    build:
      context: .
      dockerfile: Dockerfile
      target: projector
    image: tfsdc-projector
    container_name: tfsdc-projector
    profiles: [app]
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-tfsdc}
      KAFKA_BROKER: kafka:29092
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-tfsdc-projector}

  recovery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: recovery-worker
    image: tfsdc-recovery-worker
    container_name: tfsdc-recovery-worker
    profiles: [app]
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-tfsdc}
      KAFKA_BROKER: kafka:29092

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3100}
    image: tfsdc-web
    container_name: tfsdc-web
    profiles: [app]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      NODE_ENV: production

volumes:
  pgdata:
  zkdata:
  zklog:
  kafkadata:
